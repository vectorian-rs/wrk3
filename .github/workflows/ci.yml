name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build-linux-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: git submodule update --init --depth 1 deps/aws-lc deps/s2n-tls deps/luajit

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get remove -y libssl-dev || true
          sudo apt-get install -y cmake ninja-build

      - name: Build
        run: cmake -G Ninja -B build && ninja -C build

      - name: Smoke test
        run: ./build/wrk --version
